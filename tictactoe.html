<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #1f2a44, #2f456b 45%, #4a6d8f);
      --panel: #f8f8ff;
      --text: #1c2230;
      --x-color: #ef476f;
      --o-color: #118ab2;
      --line: #d4d8e2;
      --button: #ffd166;
      --button-dark: #f4b942;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: "Verdana", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      width: min(94vw, 500px);
      background: rgba(248, 248, 255, 0.96);
      border-radius: 18px;
      padding: 1.2rem;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.24);
    }

    h1 {
      margin: 0 0 0.8rem;
      text-align: center;
      letter-spacing: 0.03em;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
    }

    .status {
      text-align: center;
      margin-bottom: 1rem;
      font-weight: 700;
      min-height: 1.4em;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }

    .cell {
      border: 2px solid var(--line);
      border-radius: 10px;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      font-size: clamp(2.3rem, 9vw, 3.2rem);
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      transition: transform 0.1s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    .cell:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(23, 32, 48, 0.12);
    }

    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    button {
      width: 100%;
      margin-top: 1rem;
      border: none;
      border-radius: 10px;
      background: var(--button);
      color: #20232a;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: var(--button-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status" aria-live="polite">Player X's turn</div>
    <section class="board" id="board" aria-label="Tic Tac Toe board"></section>
    <button id="resetBtn" type="button">Reset Game</button>
  </main>

  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");

    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let cells = Array(9).fill("");
    let player = "X";
    let isOver = false;

    function renderBoard() {
      boardEl.innerHTML = "";
      cells.forEach((value, i) => {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cell" + (value ? " " + value.toLowerCase() : "");
        cell.dataset.index = i;
        cell.textContent = value;
        cell.disabled = Boolean(value) || isOver;
        cell.setAttribute("aria-label", "Cell " + (i + 1) + (value ? ", " + value : ""));
        boardEl.appendChild(cell);
      });
    }

    function getWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
          return cells[a];
        }
      }
      return null;
    }

    function updateStatus() {
      const winner = getWinner();
      if (winner) {
        statusEl.textContent = "Player " + winner + " wins";
        isOver = true;
        return;
      }

      if (cells.every(Boolean)) {
        statusEl.textContent = "It's a draw";
        isOver = true;
        return;
      }

      statusEl.textContent = "Player " + player + "'s turn";
    }

    function onCellClick(e) {
      const target = e.target;
      if (!target.classList.contains("cell") || isOver) return;

      const idx = Number(target.dataset.index);
      if (cells[idx]) return;

      cells[idx] = player;
      player = player === "X" ? "O" : "X";

      updateStatus();
      renderBoard();
    }

    function resetGame() {
      cells = Array(9).fill("");
      player = "X";
      isOver = false;
      updateStatus();
      renderBoard();
    }

    boardEl.addEventListener("click", onCellClick);
    resetBtn.addEventListener("click", resetGame);

    updateStatus();
    renderBoard();
  </script>
</body>
</html>
